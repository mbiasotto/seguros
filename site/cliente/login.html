<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Multiplic.cc</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="../assets/css/cliente.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container-fluid vh-100">
        <div class="row h-100">
            <!-- Left Side - Card Visual -->
            <div class="col-lg-6 d-none d-lg-flex login-left">
                <div class="login-bg"></div>
                <div class="login-content d-flex flex-column justify-content-center align-items-center p-5">
                    <div class="text-white text-center mb-5">
                        <h2 class="display-6 fw-bold mb-3">Multiplic.cc</h2>
                        <p class="fs-5">Sua vida financeira na palma da mão</p>
                    </div>
                    
                    <!-- Card Visual -->
                    <div class="login-card">
                        <div class="card-shine"></div>
                        <div class="card-top-line"></div>
                        <div class="card-content">
                            <div class="d-flex justify-content-between align-items-start mb-4">
                                <div class="text-white fw-bold fs-5">Multiplic</div>
                                <i class="fas fa-credit-card text-warning fs-4"></i>
                            </div>
                            <div class="text-white fs-5 font-monospace mb-3">•••• •••• •••• 1234</div>
                            <div class="d-flex justify-content-between text-white small">
                                <div>
                                    <div class="text-muted" style="font-size: 0.7rem;">VÁLIDO ATÉ</div>
                                    <div>12/28</div>
                                </div>
                                <div class="text-end">
                                    <div class="text-muted" style="font-size: 0.7rem;">TITULAR</div>
                                    <div>SEU NOME</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Right Side - Login Form -->
            <div class="col-lg-6 d-flex align-items-center justify-content-center">
                <div class="login-form-container">
                    <div class="text-center mb-5">
                        <h1 class="h2 fw-bold text-dark mb-2">Acesse sua conta</h1>
                        <p class="text-muted">Digite seus dados para continuar</p>
                    </div>
                    
                    <form id="loginForm">
                        <div class="mb-4">
                            <label class="form-label fw-medium text-dark">CPF</label>
                            <input type="text" class="form-control form-control-lg" id="cpfInput" placeholder="000.000.000-00" required>
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label fw-medium text-dark">Senha</label>
                            <div class="input-group">
                                <input type="password" class="form-control form-control-lg" id="passwordInput" placeholder="Digite sua senha" required>
                                <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                                    <i class="fas fa-eye" id="passwordIcon"></i>
                                </button>
                            </div>
                        </div>
                        
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="rememberMe">
                                <label class="form-check-label small text-muted" for="rememberMe">
                                    Lembrar de mim
                                </label>
                            </div>
                            <a href="#" class="text-warning text-decoration-none small">Esqueci minha senha</a>
                        </div>
                        
                        <button type="submit" class="btn btn-dark btn-lg w-100 fw-bold mb-4">
                            Entrar
                        </button>
                        
                        <div class="text-center">
                            <p class="text-muted mb-3">Primeiro acesso?</p>
                            <a href="../cadastro.html" class="btn btn-outline-warning btn-lg w-100 fw-bold">
                                Cadastre-se
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- Custom JS -->
    <script src="../assets/js/cliente-login.js"></script>
</body>
</html>
